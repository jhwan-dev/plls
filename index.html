<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>plls</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --dark2: #181818;
    --dark3: #222222;
    --green: #1DB954;
    --green-dim: #1aa34a;
    --green-glow: rgba(29,185,84,0.15);
    --green-subtle: rgba(29,185,84,0.07);
    --white: #ffffff;
    --gray: #b3b3b3;
    --gray-dim: #535353;
    --border: rgba(255,255,255,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--dark); }
  ::-webkit-scrollbar-thumb { background:var(--green); border-radius:2px; }

  .page { display:none; min-height:100vh; }
  .page.active { display:block; }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top:0; left:0; right:0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 64px;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--green);
    cursor: pointer;
    transition: opacity 0.2s;
    text-shadow:
      0 0 20px rgba(29,185,84,0.7),
      0 0 40px rgba(29,185,84,0.35),
      0 0 80px rgba(29,185,84,0.15);
    position: relative;
  }
  .nav-logo::before {
    content:'';
    position:absolute;
    inset:-12px -24px;
    background:radial-gradient(ellipse 120% 200% at 50% 50%, rgba(29,185,84,0.12) 0%, transparent 70%);
    border-radius:50%;
    pointer-events:none;
    animation:logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { opacity:0.7; transform:scale(1); }
    50% { opacity:1; transform:scale(1.08); }
  }
  .nav-logo:hover { opacity:0.9; text-shadow:0 0 28px rgba(29,185,84,0.9),0 0 56px rgba(29,185,84,0.5),0 0 100px rgba(29,185,84,0.2); }

  .nav-links { display:flex; gap:32px; align-items:center; }

  .nav-link {
    font-size:13px; font-weight:500; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--gray);
    cursor:pointer; transition:color 0.2s; text-decoration:none;
  }
  .nav-link:hover { color:var(--white); }

  .nav-right { display:flex; align-items:center; gap:16px; }

  .btn-login {
    padding:8px 24px; background:transparent;
    border:1px solid var(--white); border-radius:20px;
    color:var(--white); font-family:'Outfit',sans-serif;
    font-size:13px; font-weight:600; letter-spacing:0.5px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-login:hover { background:var(--white); color:var(--black); transform:scale(1.03); }

  .btn-green {
    padding:8px 24px; background:var(--green); border:none;
    border-radius:20px; color:var(--black);
    font-family:'Outfit',sans-serif; font-size:13px;
    font-weight:700; letter-spacing:0.5px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-green:hover { background:#1ed760; transform:scale(1.03); }

  /* ===== HERO ===== */
  .hero {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative; overflow:hidden; padding-top:64px;
  }

  .hero-bg {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 30%, rgba(29,185,84,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 60%, rgba(29,185,84,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 70%, rgba(29,185,84,0.04) 0%, transparent 60%);
  }

  .hero-noise {
    position:absolute; inset:0; opacity:0.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .hero-content { position:relative; text-align:center; z-index:2; }

  .hero-eyebrow {
    font-size:11px; font-weight:600; letter-spacing:4px;
    text-transform:uppercase; color:var(--green); margin-bottom:24px;
    animation:fadeUp 0.8s ease both;
  }

  .hero-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(80px,15vw,180px);
    line-height:0.9; letter-spacing:8px; color:var(--white);
    animation:fadeUp 0.8s 0.1s ease both;
    text-shadow:
      0 0 40px rgba(29,185,84,0.5),
      0 0 80px rgba(29,185,84,0.25),
      0 0 160px rgba(29,185,84,0.12);
    position:relative;
  }
  .hero-title::after {
    content:'';
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:140%; height:200%;
    background:radial-gradient(ellipse 60% 55% at 50% 50%, rgba(29,185,84,0.13) 0%, rgba(29,185,84,0.05) 40%, transparent 70%);
    pointer-events:none;
    animation:heroGlowPulse 4s ease-in-out infinite; z-index:-1;
  }
  @keyframes heroGlowPulse {
    0%,100% { opacity:0.7; transform:translate(-50%,-50%) scale(1); }
    50% { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  }
  .hero-title span { color:var(--green); }

  .hero-cta {
    margin-top:48px; display:flex; gap:16px; justify-content:center;
    animation:fadeUp 0.8s 0.3s ease both;
  }
  .hero-cta .btn-green { padding:14px 36px; font-size:14px; border-radius:30px; }
  .hero-cta .btn-outline {
    padding:14px 36px; font-size:14px; border-radius:30px;
    background:transparent; border:1px solid rgba(255,255,255,0.3);
    color:var(--white); font-family:'Outfit',sans-serif;
    font-weight:600; cursor:pointer; transition:all 0.2s;
  }
  .hero-cta .btn-outline:hover { border-color:var(--white); background:rgba(255,255,255,0.05); }

  .hero-scroll {
    position:absolute; bottom:32px; left:50%;
    transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center;
    gap:8px; color:var(--gray-dim); font-size:11px;
    letter-spacing:2px; text-transform:uppercase;
    animation:fadeUp 1s 0.6s ease both;
  }
  .scroll-line {
    width:1px; height:40px;
    background:linear-gradient(to bottom, var(--green), transparent);
    animation:scrollPulse 2s ease infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity:0.3; transform:scaleY(1); }
    50% { opacity:1; transform:scaleY(1.2); }
  }

  /* ===== SECTIONS ===== */
  .section { padding:80px 48px; }

  .section-header {
    display:flex; align-items:baseline;
    justify-content:space-between; margin-bottom:40px;
  }

  .section-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:42px; letter-spacing:3px; color:var(--white); position:relative;
  }
  .section-title::after {
    content:''; display:block; width:40px; height:2px;
    background:var(--green); margin-top:6px;
  }

  .see-all {
    font-size:12px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--gray); cursor:pointer;
    text-decoration:none; transition:color 0.2s;
    border-bottom:1px solid var(--gray-dim); padding-bottom:1px;
  }
  .see-all:hover { color:var(--green); border-color:var(--green); }

  .divider { height:1px; background:var(--border); margin:0 48px; }

  /* ===== PLAYLIST CARDS ===== */
  .playlists-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:24px;
  }

  .playlist-card {
    background:var(--dark2); border-radius:8px; overflow:hidden;
    cursor:pointer; transition:all 0.25s ease; border:1px solid transparent; position:relative;
  }
  .playlist-card:hover { background:var(--dark3); border-color:var(--border); transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.4); }

  .playlist-cover-img {
    width:100%; aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    font-size:48px; position:relative; overflow:hidden;
  }

  .play-overlay {
    position:absolute; bottom:12px; right:12px;
    width:44px; height:44px; background:var(--green);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    opacity:0; transform:translateY(8px);
    transition:all 0.2s ease; box-shadow:0 8px 20px rgba(29,185,84,0.4);
  }
  .playlist-card:hover .play-overlay { opacity:1; transform:translateY(0); }
  .play-overlay svg { fill:var(--black); margin-left:3px; }

  .playlist-info { padding:14px 16px 16px; }
  .playlist-name { font-weight:600; font-size:14px; color:var(--white); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .playlist-uploader { font-size:12px; color:var(--gray); margin-bottom:10px; }
  .playlist-uploader span { cursor:pointer; transition:color 0.2s; }
  .playlist-uploader span:hover { color:var(--white); }

  .playlist-meta { display:flex; align-items:center; gap:14px; }
  .meta-btn {
    display:flex; align-items:center; gap:5px;
    font-size:11px; color:var(--gray-dim); cursor:pointer;
    transition:color 0.2s; background:none; border:none;
    font-family:'Outfit',sans-serif;
  }
  .meta-btn:hover { color:var(--green); }
  .meta-btn.liked { color:var(--green); }
  .meta-btn svg { width:14px; height:14px; }

  /* 좋아요 애니메이션 */
  @keyframes likePoP {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.5); }
    60%  { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  @keyframes likeParticle {
    0%   { opacity:1; transform: translate(0,0) scale(1); }
    100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
  .meta-btn.like-pop svg { animation: likePoP 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both; }
  .like-particle {
    position:absolute; width:5px; height:5px;
    border-radius:50%; background:var(--green);
    pointer-events:none; animation: likeParticle 0.5s ease-out forwards;
  }

  /* ===== UPLOADERS ===== */
  .uploaders-row { display:flex; gap:20px; overflow-x:auto; padding-bottom:8px; padding-top:4px; scrollbar-width:none; }
  .uploaders-row::-webkit-scrollbar { display:none; }

  .uploader-card { flex:0 0 160px; text-align:center; cursor:pointer; transition:transform 0.2s; padding-top:8px; }
  .uploader-card:hover { transform:translateY(-4px); }

  .uploader-avatar {
    width:90px; height:90px; border-radius:50%;
    margin:0 auto 12px; display:flex; align-items:center;
    justify-content:center; font-size:32px;
    border:2px solid transparent; transition:border-color 0.2s;
  }
  .uploader-card:hover .uploader-avatar { border-color:var(--green); }
  .uploader-avatar.hot {
    box-shadow:0 0 0 2px var(--black), 0 0 0 4px var(--green), 0 0 20px rgba(29,185,84,0.4);
    animation:hotPulse 2.5s ease-in-out infinite;
  }
  @keyframes hotPulse {
    0%,100% { box-shadow:0 0 0 2px var(--black),0 0 0 4px var(--green),0 0 20px rgba(29,185,84,0.3); }
    50% { box-shadow:0 0 0 2px var(--black),0 0 0 4px var(--green),0 0 30px rgba(29,185,84,0.6); }
  }

  .uploader-name { font-weight:600; font-size:13px; color:var(--white); margin-bottom:2px; }
  .uploader-stat { font-size:11px; color:var(--green); font-weight:500; }
  .uploader-followers { font-size:11px; color:var(--gray-dim); margin-top:2px; }

  .follow-btn {
    margin-top:10px; padding:5px 16px; background:transparent;
    border:1px solid var(--gray-dim); border-radius:12px;
    color:var(--white); font-size:11px; font-weight:600;
    cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.2s;
  }
  .follow-btn:hover { border-color:var(--white); }
  .follow-btn.following { background:var(--green); border-color:var(--green); color:var(--black); }

  /* ===== CELEB CARDS ===== */
  .celeb-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:20px; }

  .celeb-card {
    background:linear-gradient(135deg, var(--dark2), var(--dark));
    border:1px solid var(--border); border-radius:12px;
    overflow:hidden; cursor:pointer; transition:all 0.25s;
    display:flex; position:relative;
  }
  .celeb-card:hover { border-color:rgba(29,185,84,0.3); transform:translateY(-3px); box-shadow:0 12px 32px rgba(29,185,84,0.1); }

  .celeb-cover { width:100px; height:100px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:36px; }
  .celeb-info { padding:16px; flex:1; min-width:0; }
  .celeb-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--green-subtle); border:1px solid rgba(29,185,84,0.3);
    border-radius:10px; padding:2px 8px; font-size:9px;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--green); margin-bottom:6px;
  }
  .celeb-name { font-weight:700; font-size:15px; color:var(--white); margin-bottom:2px; }
  .celeb-playlist-name { font-size:12px; color:var(--gray); margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .celeb-likes { font-size:11px; color:var(--gray-dim); display:flex; align-items:center; gap:4px; }

  /* ===== LOGIN PAGE ===== */
  .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .login-bg { position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(29,185,84,0.08) 0%, transparent 70%); }

  .login-box {
    position:relative; z-index:2; width:100%; max-width:420px;
    padding:48px; background:rgba(24,24,24,0.95);
    border:1px solid var(--border); border-radius:16px;
    backdrop-filter:blur(20px); text-align:center;
  }

  .login-logo { font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:6px; color:var(--green); margin-bottom:40px; }

  .login-title { font-size:20px; font-weight:700; color:var(--white); margin-bottom:8px; }
  .login-desc { font-size:13px; color:var(--gray); line-height:1.6; margin-bottom:32px; }

  .spotify-login-btn {
    width:100%; padding:16px; background:var(--green); border:none;
    border-radius:30px; color:var(--black);
    font-family:'Outfit',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:12px; transition:all 0.2s; letter-spacing:0.3px;
  }
  .spotify-login-btn:hover { background:#1ed760; transform:scale(1.02); }

  .login-divider { display:flex; align-items:center; gap:16px; margin:24px 0; color:var(--gray-dim); font-size:12px; }
  .login-divider::before,.login-divider::after { content:''; flex:1; height:1px; background:var(--border); }

  .login-terms { font-size:11px; color:var(--gray-dim); line-height:1.6; margin-top:24px; }
  .login-terms span { color:var(--gray); cursor:pointer; text-decoration:underline; }

  .back-btn {
    margin-top:24px; background:none; border:none; color:var(--gray);
    font-size:13px; cursor:pointer; font-family:'Outfit',sans-serif;
    display:flex; align-items:center; gap:6px;
    margin-left:auto; margin-right:auto; transition:color 0.2s;
  }
  .back-btn:hover { color:var(--white); }

  .demo-btn {
    width:100%; padding:12px; background:transparent;
    border:1px solid var(--border); border-radius:8px;
    color:var(--gray); font-family:'Outfit',sans-serif;
    font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s;
  }
  .demo-btn:hover { border-color:var(--gray); color:var(--white); }

  /* ===== PROFILE ===== */
  .profile-header { background:linear-gradient(to bottom, rgba(29,185,84,0.15),transparent); padding:100px 48px 40px; }
  .profile-top { display:flex; align-items:flex-end; gap:32px; margin-bottom:32px; }
  .profile-avatar-lg {
    width:160px; height:160px; border-radius:50%;
    border:3px solid var(--green); display:flex; align-items:center;
    justify-content:center; font-size:64px; flex-shrink:0; overflow:hidden; background:var(--dark2);
  }
  .profile-type { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--white); margin-bottom:8px; }
  .profile-username { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,6vw,80px); letter-spacing:3px; color:var(--white); line-height:1; margin-bottom:12px; }
  .profile-bio { font-size:14px; color:var(--gray); margin-bottom:16px; font-style:italic; font-family:'DM Serif Display',serif; }
  .profile-stats { display:flex; gap:32px; font-size:13px; color:var(--gray); }
  .profile-stat strong { color:var(--white); font-size:16px; font-weight:700; display:block; margin-bottom:2px; }
  .profile-actions { display:flex; gap:12px; margin-top:20px; }

  /* ===== MODALS ===== */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.active { display:flex; }

  .modal { background:var(--dark2); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:500px; position:relative; max-height:90vh; overflow-y:auto; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--white); margin-bottom:24px; }
  .modal-close { position:absolute; top:16px; right:20px; background:none; border:none; color:var(--gray); font-size:24px; cursor:pointer; line-height:1; transition:color 0.2s; }
  .modal-close:hover { color:var(--white); }

  .form-group { margin-bottom:20px; }
  .form-label { display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); margin-bottom:8px; }
  .form-input { width:100%; padding:12px 16px; background:var(--dark3); border:1px solid var(--border); border-radius:8px; color:var(--white); font-family:'Outfit',sans-serif; font-size:14px; transition:border-color 0.2s; outline:none; }
  .form-input:focus { border-color:var(--green); }
  .form-input::placeholder { color:var(--gray-dim); }
  select.form-input { cursor:pointer; }
  select.form-input option { background:var(--dark2); }

  .photo-upload-area { border:1.5px dashed var(--border); border-radius:8px; padding:32px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .photo-upload-area:hover { border-color:var(--green); background:var(--green-subtle); }
  .photo-upload-text { font-size:13px; color:var(--gray); }

  .comment-list { max-height:300px; overflow-y:auto; margin-bottom:16px; }
  .comment-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .comment-item:last-child { border-bottom:none; }
  .comment-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; background:var(--dark3); }
  .comment-user { font-size:12px; font-weight:700; color:var(--white); margin-bottom:2px; }
  .comment-text { font-size:13px; color:var(--gray); line-height:1.5; }
  .comment-time { font-size:10px; color:var(--gray-dim); margin-top:4px; }
  .comment-input-row { display:flex; gap:10px; }
  .comment-input-row .form-input { flex:1; }

  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark3); border:1px solid var(--green); border-radius:24px; padding:12px 24px; font-size:13px; font-weight:600; color:var(--white); z-index:300; transition:transform 0.3s ease; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation:fadeUp 0.5s ease both; }

  .grad-1{background:linear-gradient(135deg,#1a3a2a,#0d1f16);}
  .grad-2{background:linear-gradient(135deg,#1a2a3a,#0d1620);}
  .grad-3{background:linear-gradient(135deg,#2a1a3a,#160d20);}
  .grad-4{background:linear-gradient(135deg,#3a2a1a,#201608);}
  .grad-5{background:linear-gradient(135deg,#1a3a3a,#0d2020);}
  .grad-6{background:linear-gradient(135deg,#3a1a1a,#200d0d);}

  @media(max-width:768px){
    nav{padding:0 20px;} .nav-links{display:none;}
    .section{padding:60px 20px;} .divider{margin:0 20px;}
    .playlists-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
    .celeb-grid{grid-template-columns:1fr;}
    .hero-title{font-size:72px;}
    .profile-header{padding:100px 20px 30px;}
    .profile-top{flex-direction:column;align-items:flex-start;}
    .modal{margin:16px;padding:28px;}
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="mainNav">

function toggleLike(id, btnEl) {
  if(!isLoggedIn){showToast('❤️ 좋아요는 로그인 후 가능해요');return;}
  const wasLiked = likedPlaylists.has(id);
  wasLiked ? likedPlaylists.delete(id) : likedPlaylists.add(id);

  const p = playlists.find(pl=>pl.id===id);
  if(!p||!btnEl) return;

  const isNowLiked = likedPlaylists.has(id);
  const count = p.likes + (isNowLiked ? 1 : 0);

  // SVG fill 업데이트
  const svg = btnEl.querySelector('svg');
  svg.setAttribute('fill', isNowLiked ? 'currentColor' : 'none');

  // 색상 토글
  btnEl.classList.toggle('liked', isNowLiked);

  // 숫자 span만 업데이트
  const countEl = btnEl.querySelector('.like-count');
  if(countEl) countEl.textContent = count;

  // 팝 애니메이션
  btnEl.classList.remove('like-pop');
  void btnEl.offsetWidth;
  btnEl.classList.add('like-pop');
  btnEl.addEventListener('animationend', ()=>btnEl.classList.remove('like-pop'), {once:true});
}



function toggleFollow(uid,btn) {
  if(!isLoggedIn){showToast('팔로우는 로그인 후 가능해요');return;}
  if(followedUsers.has(uid)){followedUsers.delete(uid);btn.textContent='팔로우';btn.classList.remove('following');showToast('팔로우를 취소했어요');}
  else{followedUsers.add(uid);btn.textContent='✓ 팔로잉';btn.classList.add('following');showToast('✓ 팔로우했어요!');}
}

  document.getElementById('commentModal').classList.add('active');
}

  if(!isLoggedIn){showToast('댓글은 로그인 후 작성할 수 있어요');return;}
  const input=document.getElementById('commentInput');
  if(!input.value.trim())return;
  if(!extraComments[currentCommentPlaylistId])extraComments[currentCommentPlaylistId]=[];
  extraComments[currentCommentPlaylistId].push({user:currentUser?.handle||'@me',emoji:'🎵',text:input.value.trim(),time:'방금'});
  input.value='';openComments(currentCommentPlaylistId);renderPlaylists();
}

function closeModal(id){document.getElementById(id).classList.remove('active');}
function openSpotify(url){showToast('🎵 Spotify로 이동합니다...');setTimeout(()=>window.open(url,'_blank'),500);}

      <div class="profile-top">

        <div class="profile-meta">
          <div class="profile-type">플레이리스트 큐레이터</div>
          <div class="profile-username">@${p.name}</div>
          <div class="profile-bio">"${p.bio}"</div>
          <div class="profile-stats">
            <div class="profile-stat"><strong>${p.followers.toLocaleString()}</strong>팔로워</div>
            <div class="profile-stat"><strong>${p.following.toLocaleString()}</strong>팔로잉</div>

          <div class="profile-actions">

function toggleFollowProfile(uid,btn) {
  if(!isLoggedIn){showToast('팔로우는 로그인 후 가능해요');return;}
  if(followedUsers.has(uid)){followedUsers.delete(uid);btn.textContent='+ 팔로우';showToast('팔로우를 취소했어요');}
  else{followedUsers.add(uid);btn.textContent='✓ 팔로잉';showToast('✓ 팔로우했어요!');}
  renderUploaders();
}

// SPOTIFY OAUTH (PKCE)
const SPOTIFY_CLIENT_ID='ac9b7020d5054bd288c0037fe8209120';
const SPOTIFY_REDIRECT_URI='https://jhwan-dev.github.io/plls/';
const SPOTIFY_SCOPES='user-read-private user-read-email playlist-read-private playlist-read-collaborative';

function generateRandomString(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a,x=>c[x%c.length]).join('');}
async function generateCodeChallenge(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}

async function handleSpotifyLogin(){
  const v=generateRandomString(128),ch=await generateCodeChallenge(v);
  localStorage.setItem('spotify_code_verifier',v);
  const p=new URLSearchParams({response_type:'code',client_id:SPOTIFY_CLIENT_ID,scope:SPOTIFY_SCOPES,redirect_uri:SPOTIFY_REDIRECT_URI,code_challenge_method:'S256',code_challenge:ch});
  window.location.href=`https://accounts.spotify.com/authorize?${p}`;
}

async function handleOAuthCallback(code){
  const v=localStorage.getItem('spotify_code_verifier');if(!v)return;
  showToast('⚡ Spotify 연동 중...');
  try{
    const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:SPOTIFY_REDIRECT_URI,client_id:SPOTIFY_CLIENT_ID,code_verifier:v})});
    const d=await r.json();
    if(d.access_token){localStorage.setItem('spotify_access_token',d.access_token);localStorage.setItem('spotify_refresh_token',d.refresh_token||'');localStorage.removeItem('spotify_code_verifier');window.history.replaceState({},document.title,SPOTIFY_REDIRECT_URI);await initLoggedInUser(d.access_token);}
    else showToast('로그인 실패. 다시 시도해주세요.');
  }catch(e){showToast('연결 오류가 발생했어요.');console.error(e);}
}

async function fetchSpotifyAPI(e,t){const r=await fetch(`https://api.spotify.com/v1${e}`,{headers:{Authorization:`Bearer ${t}`}});if(!r.ok)throw new Error(r.status);return r.json();}

async function initLoggedInUser(token){
  try{
    const p=await fetchSpotifyAPI('/me',token);
    isLoggedIn=true;
    currentUser={handle:'@'+(p.display_name||p.id).replace(/\s/g,'_').toLowerCase(),name:p.display_name||p.id,image:p.images?.[0]?.url||null,id:p.id,token};
    updateNavForLogin();showPage('home');showToast(`🎉 환영해요, ${currentUser.name}님!`);
    await loadUserPlaylists(token);
  }catch(e){showToast('프로필을 불러오지 못했어요.');console.error(e);}
}

async function loadUserPlaylists(token){
  try{const d=await fetchSpotifyAPI('/me/playlists?limit=20',token);userSpotifyPlaylists=d.items||[];renderPlaylistDropdown();}
  catch(e){console.error(e);}
}

function renderPlaylistDropdown(){
  const el=document.getElementById('spotifyPlaylistSelect');if(!el)return;
  el.innerHTML='<option value="">-- 플레이리스트를 선택하세요 --</option>'+
    userSpotifyPlaylists.map((p,i)=>`<option value="${i}">${p.name} (${p.tracks?.total||0}곡)</option>`).join('');
}

function onPlaylistSelect(sel){
  const idx=parseInt(sel.value);
  const preview=document.getElementById('uploadPreview');
  if(isNaN(idx)||sel.value===''){preview.style.display='none';return;}
  const p=userSpotifyPlaylists[idx];
  if(!p)return;
  document.getElementById('previewCover').src=p.images?.[0]?.url||'';
  document.getElementById('previewName').textContent=p.name;
  document.getElementById('previewTracks').textContent=`${p.tracks?.total||0}곡`;
  preview.style.display='flex';
}

function submitUpload(){
  const sel=document.getElementById('spotifyPlaylistSelect');
  const idx=parseInt(sel?.value);
  if(isNaN(idx)||!sel?.value){showToast('플레이리스트를 선택해주세요');return;}

  const sp=userSpotifyPlaylists[idx];
  if(!sp){showToast('플레이리스트 정보를 찾을 수 없어요');return;}

  const desc=document.getElementById('uploadDesc').value;
  const newId=Date.now();
  const newCard={
    id: newId,
    name: sp.name,
    uploader: currentUser.handle,
    uid: 'me',
    emoji: '🎵',
    grad: 'grad-1',
    coverImg: sp.images?.[0]?.url || null,
    likes: 0,
    comments: 0,
    spotifyUrl: sp.external_urls?.spotify || '#',
    desc: desc,
    isNew: true,
  };

  // 피드 맨 앞에 추가
  playlists.unshift(newCard);
  closeModal('uploadModal');
  renderPlaylists();
  showToast('🎵 피드에 공유됐어요!');
  setTimeout(()=>scrollToSection('today-playlists'),300);

  // 초기화
  sel.selectedIndex=0;
  document.getElementById('uploadDesc').value='';
  document.getElementById('uploadPreview').style.display='none';
}

function updateNavForLogin(){
  const avatar=currentUser.image
    ?`<img src="${currentUser.image}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--green);cursor:pointer;" onclick="showToast('${currentUser.name}님으로 로그인됨')">`
    :`<div style="width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--black);cursor:pointer;" onclick="showToast('${currentUser.name}님으로 로그인됨')">${(currentUser.name||'?')[0].toUpperCase()}</div>`;
  document.getElementById('navRight').innerHTML=`<button class="btn-green" onclick="openUploadModal()">+ 공유하기</button>${avatar}<button class="btn-login" onclick="handleLogout()" style="font-size:11px;padding:6px 14px;">로그아웃</button>`;
}

function handleLogout(){
  localStorage.removeItem('spotify_access_token');localStorage.removeItem('spotify_refresh_token');
  isLoggedIn=false;currentUser=null;userSpotifyPlaylists=[];
  document.getElementById('navRight').innerHTML=`<button class="btn-login" onclick="showPage('login')">로그인</button>`;
  showPage('home');showToast('로그아웃됐어요');
}

function openUploadModal(){
  if(!isLoggedIn){showPage('login');return;}
  document.getElementById('uploadModal').classList.add('active');
  // 모달 열 때마다 최신 플레이리스트 자동 동기화
  if(currentUser?.token){
    const sel=document.getElementById('spotifyPlaylistSelect');
    sel.innerHTML='<option value="">⏳ 플레이리스트 불러오는 중...</option>';
    loadUserPlaylists(currentUser.token).then(()=>{
      showToast('✓ 플레이리스트 동기화 완료');
    }).catch(()=>{
      sel.innerHTML='<option value="">⚠️ 불러오기 실패 — 다시 시도해주세요</option>';
    });
  }
}

function handleDemoLogin(){
  isLoggedIn=true;currentUser={handle:'@guest',name:'게스트'};
  updateNavForLogin();showPage('home');showToast('👀 게스트로 둘러보는 중');
}

function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');window.scrollTo(0,0);}
function scrollToSection(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('active');}));

async function init(){
  const code=new URLSearchParams(window.location.search).get('code');
  if(code){await handleOAuthCallback(code);}
  else{const t=localStorage.getItem('spotify_access_token');if(t){try{await initLoggedInUser(t);}catch(e){localStorage.removeItem('spotify_access_token');}}}
  renderPlaylists();renderUploaders();renderCelebs();
}
init();
